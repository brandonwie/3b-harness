# ─────────────────────────────────────────────────────────────────────
# 3b-forge Source Manifest
# ─────────────────────────────────────────────────────────────────────
# Maps each forge file derived from the maintainer's 3B repo to its
# source path and the 3B commit SHA at the time of sync.
#
# Purpose
#   - Drift detection: scripts/check-3b-drift.sh reads this manifest,
#     runs `git -C $FORGE_3B_ROOT log <source_sha>..HEAD -- <source_path>`
#     for each entry, and reports files whose 3B source has moved since
#     the last sync.
#   - No 3B content lives in this file — only path references and SHAs.
#     Public-safe.
#
# Maintenance
#   - On every new migration from 3B (or re-sync after drift detected),
#     update the corresponding entry's `source_sha` and `synced_at`.
#   - Wave 1 entries are NOT yet recorded here; they'll be back-filled
#     the next time those files are re-derived from 3B.
#
# Scrub rule vocabulary
#   - placeholder:{name}      — {placeholder}-style substitution (e.g.,
#                                {github_user}, {blog_domain}, {project})
#   - env_var:{NAME}          — runtime $NAME read (e.g., FORGE_3B_ROOT)
#   - strip_personal_refs     — removed hardcoded project names, emails, etc.
#   - strip_work_refs         — replaced work-project-specific examples
#   - optional_gate           — added "skip if X absent" logic
# ─────────────────────────────────────────────────────────────────────

